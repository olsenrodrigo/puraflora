server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # Assets com hash — cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imagens de produtos e marca
    location ~* ^/(products|brand)/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA — todas as rotas caem no index.html (wouter usa history API)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
